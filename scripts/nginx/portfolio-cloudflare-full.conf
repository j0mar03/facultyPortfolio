# Nginx configuration for Faculty Portfolio with Cloudflare Full (strict)
# Domain: portfolio.itechportfolio.xyz
# Place this file in /etc/nginx/sites-available/portfolio
#
# Requirements:
# - Valid certificate on origin (Let's Encrypt or Cloudflare Origin Certificate)
# - Cloudflare SSL/TLS mode set to Full (strict)

# HTTP server for ACME + redirect
server {
    listen 80;
    listen [::]:80;
    server_name portfolio.itechportfolio.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS origin server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portfolio.itechportfolio.xyz;

    # If using Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/portfolio.itechportfolio.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.itechportfolio.xyz/privkey.pem;

    # If using Cloudflare Origin Certificate, replace with:
    # ssl_certificate /etc/ssl/certs/cloudflare-origin.crt;
    # ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
