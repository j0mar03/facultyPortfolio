services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: facultyportfolio-app
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - composer-cache:/tmp/composer-cache
    environment:
      - TZ=UTC
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: facultyportfolio-web
    ports:
      - "8081:80"
      - "8443:443"
    depends_on:
      - app
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:8.0
    container_name: facultyportfolio-db
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_PORT_FORWARD:-3307}:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-faculty_portfolio}
      - MYSQL_USER=${DB_USERNAME:-faculty}
      - MYSQL_PASSWORD=${DB_PASSWORD:-change-me}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-change-root-password}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
  composer-cache:
